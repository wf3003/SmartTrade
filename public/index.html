<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTrade</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;font-size:18px}
h1{color:#58a6ff;font-size:26px;margin-bottom:8px}
h2{color:#8b949e;font-weight:400;font-size:18px;margin-bottom:16px}
h3{color:#58a6ff;font-size:20px;margin:20px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,380px));gap:16px;margin-bottom:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.card h4{color:#58a6ff;font-size:16px;margin-bottom:10px}
.stat{display:flex;justify-content:space-between;padding:5px 0;font-size:17px;border-bottom:1px solid #21262d}
.stat:last-child{border-bottom:none}
.label{color:#8b949e}
.value{font-weight:600}
.green{color:#3fb950}
.red{color:#f85149}
.yellow{color:#d2991d}
.badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:14px;font-weight:600}
.long-badge{background:#3a1a1a;color:#f85149}
.short-badge{background:#1a3a1a;color:#3fb950}
.hold-badge{background:#1a1a2e;color:#8b949e}
.close-badge{background:#2d1b00;color:#d2991d}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-33.333%)}}
table{width:100%;border-collapse:collapse;font-size:16px}
th{text-align:left;padding:10px 12px;color:#8b949e;border-bottom:1px solid #30363d;font-weight:600;font-size:15px}
td{padding:10px 12px;border-bottom:1px solid #21262d}
.num{text-align:right}
.summary-box{background:#161b22;border:1px solid #d2991d;border-radius:8px;padding:14px 18px;margin:12px 0}
#error-box{background:#3a1a1a;border:1px solid #f85149;border-radius:8px;padding:14px;margin:10px 0;display:none}
</style>
</head>
<body>
<h1>SmartTrade</h1>
<h2>AI/OKX/Gate/Binance</h2>
<div id="ticker" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;margin-bottom:12px;overflow:hidden;height:36px;position:relative">
  <div id="ticker-inner" style="white-space:nowrap;position:absolute;animation:none;font-size:14px;color:#8b949e;line-height:20px"></div>
</div>
<div id="error-box"></div>
<div id="account-row" style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;min-height:180px">
  <div id="account-card" class="card" style="flex:1 1 240px;min-width:240px"></div>
  <div id="config-card" class="card" style="flex:1 1 240px;min-width:240px"></div>
  <div class="card" style="flex:2 1 360px;min-width:260px"><h4>📈 权益曲线</h4><div style="position:relative"><canvas id="equityChart" style="width:100%;height:280px"></canvas><div id="chartTip" style="display:none;position:absolute;background:#1a1a2e;border-radius:4px;padding:2px 8px;font-size:13px;border-width:1px;border-style:solid;pointer-events:none;white-space:nowrap"></div></div></div>
</div>
<h3>实时持仓 <span id="ts"></span></h3>
<table style="font-size:15px"><thead><tr><th class="num">时间</th><th>币种</th><th>方向</th><th class="num">杠杆</th><th class="num">开仓价</th><th class="num">标记价</th><th class="num">数量</th><th class="num">盈亏$</th><th class="num">盈亏%</th><th class="num">保证金</th></tr></thead><tbody id="pos-table"><tr><td colspan="10" style="text-align:center;color:#8b949e;padding:20px">⏳ 加载中...</td></tr></tbody></table>
<h3>AI 分析 <span id="cycle"></span></h3>
<table><thead><tr><th>币种</th><th>趋势</th><th class="num">评分</th><th>1分</th><th>5分</th><th>15分</th><th>1时</th><th>1日</th><th>关键位</th></tr></thead><tbody id="ana-table"><tr><td colspan="9" style="text-align:center;color:#8b949e;padding:20px">⏳ 加载中...</td></tr></tbody></table>
<div id="summary-box" class="summary-box"></div>
<h3>交易记录 <span id="trade-count"></span></h3>
<table style="font-size:15px"><thead><tr><th class="num">#</th><th class="num">时间</th><th>币种</th><th>方向</th><th class="num">杠杆</th><th class="num">开仓价</th><th class="num">数量</th><th class="num">价值</th><th class="num">保证金</th><th class="num">盈亏$</th><th class="num">盈亏%</th></tr></thead><tbody id="trade-table"></tbody></table>
<div id="history-area" style="margin-top:20px">
  <button onclick="toggleHistory()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:15px">📊 历史复盘</button>
  <div id="history-panel" style="display:none;margin-top:12px">
    <div id="history-loading" style="color:#8b949e;padding:10px">加载中...</div>
    <div id="history-content"></div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const sa = (n,d) => Number(n||0).toFixed(d);
const sc = v => v>=0?"green":"red";
const dt = s => { const d=new Date(s); return isNaN(d.getTime())? (s||"").slice(11,19) : d.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}); };
const dd = s => { const d=new Date(s); return isNaN(d.getTime())? (s||"").slice(0,10) : d.toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit"}); };
const stLabel={pending:"待执行",success:"✅成功",failed:"❌失败",skipped:"⏭️跳过"};
const stColor={success:"#3fb950",failed:"#f85149",pending:"#8b949e",skipped:"#d2991d"};
const lastPrice={};
const lb={buy:"做多",sell:"做空",hold:"观望",close:"平仓","close_partial":"部分平仓"};

async function toggleHistory(){
  const p=$("history-panel");
  if(p.style.display==="block"){p.style.display="none";return}
  p.style.display="block";
  $("history-loading").style.display="block";
  $("history-content").innerHTML="";
  try{
    const r=await fetch("/api/history?days=7");
    const d=await r.json();
    $("history-loading").style.display="none";
    let html="";
    // 统计摘要
    const st=d.stats||{};
    const wr=st.winRate||0;
    const wrColor=wr>=50?"#3fb950":wr>0?"#d2991d":"#f85149";
    html+=`<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 18px;margin:0 0 14px">`;
    html+=`<h4 style="color:#58a6ff;margin:0 0 10px">📊 胜率统计 (近7天)</h4>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:12px;font-size:15px">`;
    html+=`<span>总交易: <b>${st.totalClosed||0}</b> 平仓 + <b>${st.totalOpen||0}</b> 持仓中</span>`;
    html+=`<span style="color:${wrColor}">胜率: <b>${sa(wr,1)}%</b> (${st.wins||0}胜/${st.losses||0}负)</span>`;
    html+=`<span style="color:${(st.totalPnl||0)>=0?"#3fb950":"#f85149"}">总盈亏: ${(st.totalPnl||0)>=0?"+":""}$${sa(st.totalPnl||0,2)}</span>`;
    html+=`<span style="color:#3fb950">最大盈利: +$${sa(st.maxWin||0,2)}</span>`;
    html+=`<span style="color:#f85149">最大亏损: -$${sa(Math.abs(st.maxLoss||0),2)}</span>`;
    html+=`</div>`;
    // 按币种胜率
    const bs=st.bySymbol||{};
    const syms=Object.keys(bs);
    if(syms.length){
      html+=`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;font-size:14px">`;
      for(const sym of syms){
        const s=bs[sym];
        const swr=s.wins+s.losses>0?(s.wins/(s.wins+s.losses)*100):0;
        const sc=s.pnl>=0?"#3fb950":"#f85149";
        html+=`<span style="background:#21262d;border-radius:4px;padding:3px 8px">${sym} <b style="color:${sc}">${sa(swr,0)}%</b> (${s.wins}胜/${s.losses}负) <span style="color:${sc}">${s.pnl>=0?"+":""}$${sa(s.pnl,2)}</span></span>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
    // 决策记录
    const decs=d.decisions||[];
    html+='<h4 style="color:#58a6ff;margin:16px 0 10px">🤖 决策记录 ('+decs.length+'条)</h4>';
    if(decs.length){
      html+='<table style="font-size:14px"><thead><tr><th>日期</th><th>时间</th><th>币种</th><th>操作</th><th class="num">杠杆</th><th class="num">置信度</th><th>状态</th><th>原因</th></tr></thead><tbody>';
      for(const dec of decs){
        const a=dec.action||"hold";
        const bc=a==="buy"?"long-badge":a==="sell"?"short-badge":a==="close"||a==="close_partial"?"close-badge":"hold-badge";
        const s=dec.status||"pending";
        html+=`<tr><td>${new Date(dec.time).toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit"})}</td><td>${dt(dec.time)}</td><td><b>${dec.symbol||"-"}</b></td><td><span class="badge ${bc}" style="font-size:12px">${lb[a]||a}</span></td><td class="num">${dec.leverage||"-"}x</td><td class="num">${sa((dec.confidence||0)*100,0)}%</td><td style="color:${stColor[s]};font-weight:600">${stLabel[s]}</td><td style="word-break:break-word;max-width:260px;font-size:13px;line-height:1.4">${dec.reason||""}</td></tr>`;
      }
      html+='</tbody></table>';
    }
    $("history-content").innerHTML=html;
  }catch(e){
    $("history-loading").innerHTML='<span style="color:#f85149">加载失败: '+e.message+'</span>';
  }
}

async function refresh(){
  try{
    const r=await fetch("/api/status");
    const d=await r.json();
    if(!d.ok) return;
    $("error-box").style.display="none";

    // 币价滚动条
    const tickers = d.tickers || {};
    let tickerHtml = "";
    for (const [sym, price] of Object.entries(tickers)) {
      const p = Number(price||0);
      const symShort = sym.replace("/USDT","");
      const color = p > 0 ? (p >= (lastPrice[sym]||p) ? "#3fb950" : "#f85149") : "#8b949e";
      lastPrice[sym] = p;
      tickerHtml += `<span style="margin-right:28px"><b style="color:#c9d1d9">${symShort}</b> <span style="color:${color}">$${Number.isInteger(p)?p.toFixed(0):p>1?p.toFixed(2):p.toFixed(4)}</span></span>`;
    }
    // 拼接 3 倍以支持连续滚动
    const tEl = $("ticker-inner");
    tEl.innerHTML = tickerHtml + " 　　" + tickerHtml + " 　　" + tickerHtml;
    tEl.style.animation = "ticker-scroll 40s linear infinite";

    // cards
    const a=d.account||{};
    const ib=d.config.initialBalance||5000;
    const pnl=a.totalEquity-ib;
    const pnlPct=ib>0?((a.totalEquity-ib)/ib*100):0;
    const pnlColor=pnl>=0?"green":"red";
    $("account-card").innerHTML=
      `<h4>账户</h4>`+
      `<div class="stat"><span class="label">初始资金</span><span class="value">$${sa(ib,2)}</span></div>`+
      `<div class="stat"><span class="label">净值</span><span class="value">$${sa(a.totalEquity,2)}</span></div>`+
      `<div class="stat"><span class="label">可用</span><span class="value">$${sa(a.availableBalance,2)}</span></div>`+
      `<div class="stat"><span class="label">未实现盈亏</span><span class="value ${sc(a.unrealizedPnl)}">$${sa(a.unrealizedPnl,2)}</span></div>`+
      `<div class="stat"><span class="label">已用保证金</span><span class="value">$${sa(a.marginUsed,2)}</span></div>`+
      `<div class="stat"><span class="label">盈亏值</span><span class="value ${pnlColor}">${pnl>=0?"+":""}$${sa(pnl,2)}</span></div>`+
      `<div class="stat"><span class="label">盈亏率</span><span class="value ${pnlColor}">${pnl>=0?"+":""}${sa(pnlPct,2)}%</span></div>`;
    $("config-card").innerHTML=
      `<h4>配置</h4>`+
      `<div class="stat"><span class="label">杠杆基数</span><span class="value">${d.config.defaultLeverage}x (可调 ${Math.round(d.config.defaultLeverage*0.4)}x-${d.config.defaultLeverage}x)</span></div>`+
      `<div class="stat"><span class="label">最大持仓数</span><span class="value">${d.config.maxPositions}</span></div>`+
      `<div class="stat"><span class="label">AI 模型</span><span class="value">${d.config.model}</span></div>`+
      `<div class="stat"><span class="label">止损</span><span class="value red">$${d.config.stopLossUsdt}</span></div>`+
      `<div class="stat"><span class="label">跟踪止盈</span><span class="value green">${d.config.trailStopRange}</span></div></div>`;

    // positions
    const pos=d.positions||[];
    if(pos.length===0){
      $("pos-table").innerHTML='<tr><td class="num" colspan="10" style="color:#8b949e;padding:20px;text-align:center">无持仓</td></tr>';
    }else{
      $("pos-table").innerHTML=pos.map(p=>{
        const c=sc(p.unrealizedPnl);
        const sideLabel = p.side==="long"?"做多":"做空";
        const t = d.recentTrades?.find(function(x){return x.symbol===p.symbol && x.status==="open";});
        const et = t?dt(t.entry_time):"-";
        return `<tr><td class="num" style="color:#8b949e;font-size:13px">${et}</td><td><b>${p.symbol}</b></td><td><span class="badge ${p.side==="long"?"long-badge":"short-badge"}">${sideLabel}</span></td><td class="num">${p.leverage}x</td><td class="num">$${sa(p.entryPrice,4)}</td><td class="num">$${sa(p.markPrice,4)}</td><td class="num">${p.qty||0}</td><td class="num ${c}">$${sa(p.unrealizedPnl,2)}</td><td class="num ${c}">${sa(p.unrealizedPnlPct,2)}%</td><td class="num">$${sa(p.margin,2)}</td></tr>`;
      }).join("");
    }

    // analysis
    const ana=(d.fullReport||{}).analysis||[];
    if(ana.length===0){
      $("ana-table").innerHTML='<tr><td colspan="9" style="text-align:center;color:#8b949e;padding:20px">等待分析...</td></tr>';
    }else{
      const trendLabel={bullish:"看涨",bearish:"看跌",neutral:"震荡"};
      const strengthLabel={strong:"强",moderate:"中",weak:"弱"};
      $("ana-table").innerHTML=ana.map(a=>{
        const cs=a.score>3?"green":a.score<-3?"red":"yellow";
        return `<tr><td><b>${a.symbol}</b></td><td class="${cs}" style="min-width:90px;white-space:nowrap">${trendLabel[a.trend]||"?"} ${strengthLabel[a.strength]||a.strength||"?"}</td><td class="num ${cs}"><b>${a.score>=0?"+":""}${a.score}</b></td><td>${a.analysis_1m||"-"}</td><td>${a.analysis_5m||"-"}</td><td>${a.analysis_15m||"-"}</td><td>${a.analysis_1h||"-"}</td><td>${a.analysis_1d||"-"}</td><td style="color:#d2991d">${a.keyLevels||"-"}</td></tr>`;
      }).join("");
    }

    // summary（含全部有评分的币种，不只newTrades）
    const sm=(d.fullReport||{}).summary||"";
    const posCmds=(d.fullReport||{}).positions||[];
    const newTrades=(d.fullReport||{}).newTrades||[];
    const allAnalysis = (d.fullReport||{}).analysis||[];
    const exe=(d.fullReport||{}).execution||{};
    const logs=(exe.log||[]);
    if(sm || posCmds.length || newTrades.length){
      let html='<div style="color:#d2991d;font-weight:600;font-size:18px;margin-bottom:8px">最终决策</div>';
      if(sm) html+='<div style="color:#3fb950;font-size:16px;line-height:1.5;margin-bottom:8px">'+sm+'</div>';
      const nonHoldCmds = posCmds.filter(p => p.action !== "hold");
      if(nonHoldCmds.length){
        html+='<div style="margin-bottom:6px;font-size:16px;color:#8b949e">📋 持仓指令:</div>';
        for(const p of nonHoldCmds){
          html+=`<div style="font-size:16px;margin-left:8px;color:#d2991d">${p.symbol}: ${p.action} — ${p.reason||""}</div>`;
        }
      }
      if(newTrades.length){
        html+='<div style="margin-top:6px;margin-bottom:6px;font-size:16px;color:#8b949e">📊 交易信号:</div>';
        const aiReview = (d.fullReport||{}).aiReview||[];
        const tradeRes = (d.fullReport||{}).tradeResults||[];
        for(const t of newTrades){
          const ai = aiReview.find((r) => r.symbol === t.symbol);
          const res = tradeRes.find((r) => r.symbol === t.symbol);
          if(res && res.status === "opened"){
            const dirLabel = res.side === "long" ? "做多" : "做空";
            const score = ai ? ai.score : 70;
            html+=`<div style="font-size:16px;margin-left:8px;color:${res.side==="long"?"#3fb950":"#f85149"}">${res.symbol}: ${dirLabel} ${res.leverage}x ✅ 已开仓 ${res.qty}张 @$${typeof res.price==="number"?res.price.toFixed(res.price>100?0:4):res.price}</div>`;
            if(ai) html+=`<div style="font-size:16px;margin-left:16px;color:#8b949e">  🤖 ✅ 评分${score} ${ai.reason||""}</div>`;
          } else if(res && res.status === "ai_rejected"){
            html+=`<div style="font-size:16px;margin-left:8px;color:#f85149">${t.symbol}: 做空 ${t.leverage}x — ${t.reason||""}</div>`;
            html+=`<div style="font-size:16px;margin-left:16px;color:#8b949e">  🤖 ❌ ${res.reason||ai?.reason||""}</div>`;
          } else {
            // 其他——显示 AI 评分
            const score = ai ? ai.score : 0;
            const emoji = score >= 70 ? "✅" : score >= 40 ? "⚠️" : "❌";
            const pctText = res && res.status === "opened" ? "" : (score < 40 ? " ❌ 评分不足" : score < 70 ? " ⚠️ 半仓" : "");
            html+=`<div style="font-size:16px;margin-left:8px;color:#f85149">${t.symbol}: 做空 ${t.leverage}x — ${t.reason||""}${pctText}</div>`;
            if(ai) html+=`<div style="font-size:16px;margin-left:16px;color:#8b949e">  🤖 ${emoji} 评分${score} ${ai.reason||""}</div>`;
          }
        }
      }
      // 被拦截的信号：策略拦截 + 运行时跳过（止损冷却/信心不足等）
      const tradeRes = (d.fullReport||{}).tradeResults||[];
      const skippedResults = tradeRes.filter(r => r.status === "skipped");
      const analysisSkipped = allAnalysis.filter(a =>
        a.score !== 0 &&
        !newTrades.some(t => t.symbol === a.symbol) &&
        !skippedResults.some(r => r.symbol === a.symbol)
      ).map(a => ({ symbol: a.symbol, reason: `score${a.score} — ${a.summary||""}` }));
      const runtimeSkipped = skippedResults.map(r => ({ symbol: r.symbol, reason: r.reason || "" }));
      const allSkipped = [...analysisSkipped, ...runtimeSkipped];
      if(allSkipped.length){
        const skippedSymbols = new Set(allSkipped.map(s => s.symbol));
        const deduped = allSkipped.filter((s, i) => {
          if (skippedSymbols.has(s.symbol)) {
            skippedSymbols.delete(s.symbol);
            return true;
          }
          return false;
        });
        html+='<div style="margin-top:6px;margin-bottom:6px;font-size:16px;color:#8b949e">⛔ 拦截:</div>';
        for(const s of deduped){
          html+=`<div style="font-size:16px;margin-left:8px;color:#d2991d">${s.symbol}: ${s.reason}</div>`;
        }
      }
      if(logs.length){
        html+='<div style="margin-top:8px;border-top:1px solid #30363d;padding-top:6px;font-size:13px;line-height:1.5">';
        for(const l of logs) html+=`<div style="color:#8b949e">${l}</div>`;
        html+='</div>';
      }
      $("summary-box").innerHTML=html;
      $("summary-box").style.display="block";
    }else{$("summary-box").style.display="none"}

    // 权益曲线（Y轴金额 + X轴时间）
    try{
    const ec = document.getElementById("equityChart");
    const eq = d.equityHistory || [];
    const initial = d.config.initialBalance || 6300;
    if (!ec) {} else if (!eq || eq.length < 2) {
      const curEq = d.account?.totalEquity || initial;
      eq.length = 0; eq.push({time:new Date(Date.now()-60000).toISOString(), equity: initial}, {time:new Date().toISOString(), equity: curEq});
    }
    ec.style.display="";
    const data = eq.map(e => e.equity);
    const labels = eq.map(e => new Date(e.time).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));
    if (data[0] !== initial) { data.unshift(initial); labels.unshift("开始"); }
    const isAbove = data[data.length-1] >= initial;
    const lineColor = isAbove ? "#f85149" : "#3fb950";
    const fillColor = isAbove ? "rgba(248,81,73,0.08)" : "rgba(63,185,80,0.08)";
    const min = Math.min(...data), max = Math.max(...data, initial);
    const pad = Math.max((max - min) * 0.05, 1);
    if (!ec._w) ec._w = ec.clientWidth;
    const w = ec._w, h = ec.clientHeight || 280;
    const mL = 60, mR = 8, mT = 8, mB = 4;
    const pw = w - mL - mR, ph = h - mT - mB;
    ec.width = w; ec.height = h;
    const ctx = ec.getContext("2d");
    const dotX = (i) => mL + pw * i / (data.length-1);
    const rMin = min - pad, rMax = max + pad;
    const dotY = (v) => mT + ph - ph * (v - rMin) / (rMax - rMin);
    ctx.clearRect(0,0,w,h);
    // Y轴金额（含初值高亮）
    ctx.font = "11px sans-serif";
    const steps = 7;
    for (let i = 0; i <= steps; i++) {
      const v = rMin + (rMax - rMin) * i / steps;
      const y = mT + ph - ph * i / steps;
      ctx.fillStyle = Math.abs(v - initial) < Math.abs((rMax-rMin)/steps/2) ? "#d2991d" : "#8b949e";
      ctx.fillText("$"+v.toFixed(0), 6, y+3);
    }
    // 初始资金参考线（始终显示）
    const initY = dotY(initial);
    ctx.setLineDash([4,4]); ctx.strokeStyle = "#d2991d"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(mL, initY); ctx.lineTo(w-mR, initY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#d2991d"; ctx.font = "10px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("$"+initial.toFixed(0)+" 初值", mL+4, initY-2);
    // 曲线（平滑，高于初值红/低于绿）
    ctx.beginPath();
    const pts = data.map((v,i) => ({x: dotX(i), y: dotY(v)}));
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length - 1; i++) {
      const xc = (pts[i].x + pts[i+1].x) / 2;
      const yc = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.lineJoin = "round"; ctx.stroke();
    ctx.lineTo(dotX(data.length-1), mT+ph); ctx.lineTo(dotX(0), mT+ph); ctx.closePath();
    ctx.fillStyle = fillColor; ctx.fill();
    // 最右端点标注最新净值
    const lp = data.length-1, lx = dotX(lp), ly = dotY(data[lp]);
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2); ctx.fillStyle = lineColor; ctx.fill();
    ctx.fillStyle = "#c9d1d9"; ctx.font = "11px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("$"+data[lp].toFixed(2), lx+8, ly > mT+ph*0.5 ? ly-5 : ly+15);
    // X轴时间（均匀取6个）
    ctx.fillStyle = "#666"; ctx.font = "10px sans-serif";
    const xTickN = 6;
    for (let i = 0; i < xTickN-1; i++) {
      const ti = Math.round(i * (labels.length-1) / (xTickN-1));
      ctx.textAlign = "center"; ctx.fillText(labels[ti]||"", dotX(ti), h-4);
    }
    // 最右侧显示"现在"
    ctx.textAlign = "center"; ctx.fillText("现在", dotX(labels.length-1), h-4);
    // 悬浮（使用 HTML div 代替画布重绘）
    const tip = document.getElementById("chartTip");
    if (!tip) return;
    ec.onmouseenter = function(){ tip.style.display = ""; };
    ec.onmouseleave = function(){ tip.style.display = "none"; };
    ec.onmousemove = function(e){
      const rect = ec.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / rect.width * w;
      const idx = Math.min(Math.max(Math.round((mx - mL) / pw * (data.length-1)), 0), data.length-1);
      const val = data[idx];
      const px = dotX(idx), py = dotY(data[idx]);
      const rightSide = px > w * 0.7;
      const tipColor = val >= initial ? "#f85149" : "#3fb950";
      tip.textContent = "$"+val.toFixed(2);
      tip.style.color = tipColor;
      tip.style.borderColor = tipColor;
      tip.style.left = (rightSide ? px - tip.offsetWidth - 10 : px + 10) + "px";
      tip.style.top = (py - 10) + "px";
    };
    }catch(e){}
    // decisions (已移除表格，保留变量以备后用)

    // trades
    const ts=(d.recentTrades||[]).map(t=>({...t,_sort:new Date(t.status==="closed"&&t.exit_time?t.exit_time:t.entry_time).getTime()})).sort((a,b)=>b._sort-a._sort);
    $("trade-count").textContent="("+ts.length+"笔)";
    if(ts.length===0){
      $("trade-table").innerHTML='<tr><td class="num" colspan="11" style="color:#8b949e;padding:20px;text-align:center">暂无交易</td></tr>';
    }else{
      $("trade-table").innerHTML=ts.map((t,i)=>{
        const isClosed=t.status==="closed";
        const side=isClosed?"平仓":(t.side==="long"?"做多":"做空");
        const dirColor=isClosed?"#d2991d":(t.side==="long"?"#f85149":"#3fb950");
        const val=t.notional||0;
        const mg=t.margin||0;
        const qtyDisplay = t.entry_qty > 100 ? Math.round(t.entry_qty) : t.entry_qty;
        const pnl=isClosed?(t.pnl||0):0;
        const pnlPct=isClosed?(t.pnl_pct||0):0;
        const pnlColor=pnl>=0?"green":"red";
        const showTime=isClosed&&t.exit_time?t.exit_time:t.entry_time;
        return `<tr><td class="num" style="color:#8b949e">${i+1}</td><td class="num">${dt(showTime)}</td><td><b>${t.symbol}</b></td><td style="color:${dirColor}">${side}</td><td class="num">${t.leverage}x</td><td class="num">$${sa(t.entry_price,4)}</td><td class="num">${qtyDisplay}</td><td class="num">$${sa(val,2)}</td><td class="num">$${sa(mg,2)}</td><td class="num ${pnlColor}">${pnl>=0?"+":""}$${sa(pnl,2)}</td><td class="num ${pnlColor}">${pnl>=0?"+":""}${sa(pnlPct,2)}%</td></tr>`;
      }).join("");
    }

    document.title = `SmartTrade | 未实现盈亏 ${(a.unrealizedPnl||0)>=0?"+":""}$${sa(a.unrealizedPnl,2)}`;
    $("ts").textContent=new Date().toLocaleTimeString();
    if(d.cycle) $("cycle").textContent="#"+d.cycle.number+(d.cycle.time?" | "+new Date(d.cycle.time).toLocaleTimeString():"");
  }catch(e){
    $("error-box").style.display="block";
    $("error-box").innerHTML='<b style="color:#f85149">Error: </b>'+e.message+'<br><pre style="color:#8b949e;font-size:12px;margin-top:4px">'+e.stack+'</pre>';
  }
}
refresh();
setInterval(refresh,4000);
</script>
</body>
